<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yard Sábado 💖</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:url('yard.png') no-repeat center center/cover;
    }

    .container{
      background:rgba(0,0,0,0.55);
      padding:40px;
      border-radius:25px;
      text-align:center;
      color:white;
      backdrop-filter: blur(6px);
      width:90%;
      max-width:500px;
      position:relative;
    }

    h1{
      font-size:2.8rem;
      margin-bottom:20px;
      text-shadow:2px 2px 10px black;
    }

    p{
      margin-bottom:20px;
      font-size:1.1rem;
    }

    .contador{
      font-size:1.4rem;
      margin-bottom:25px;
      color:#ffd6e7;
      font-weight:bold;
    }

    .buttons{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:20px;
      position:relative;
      height:90px;
    }

    button{
      border:none;
      padding:15px 30px;
      font-size:1.1rem;
      border-radius:15px;
      cursor:pointer;
      transition:0.2s;
      font-weight:bold;
    }

    #sim{
      background:#ff4d88;
      color:white;
    }

    #sim:hover{
      transform:scale(1.1);
    }

    #nao{
      background:white;
      color:black;
      position:absolute;
      left:65%;
      top:0;
    }

    .mensagem{
      margin-top:25px;
      font-size:1.5rem;
      display:none;
      animation:aparecer 0.5s ease;
    }

    @keyframes aparecer{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* AJUSTE MOBILE */
    @media(max-width:600px){

      h1{
        font-size:2.2rem;
      }

      .buttons{
        height:120px;
      }

      #nao{
        left:60%;
        top:55px;
      }

      button{
        padding:14px 24px;
        font-size:1rem;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Yard sábado? 💖</h1>

    <p>Vote com sinceridade 😌</p>

    <div class="contador">
      Votos SIM: <span id="contador">0</span>
    </div>

    <div class="buttons">
      <button id="sim">SIM 💘</button>
      <button id="nao">NÃO 😭</button>
    </div>

    <div class="mensagem" id="mensagem">
      
    </div>

  </div>

  <script>
    const nao = document.getElementById("nao");
    const sim = document.getElementById("sim");
    const mensagem = document.getElementById("mensagem");
    const contador = document.getElementById("contador");

    let votos = localStorage.getItem("votosSim");

    if(votos === null){
      votos = 0;
    }

    contador.innerText = votos;

    // botão NÃO fugindo
    function fugir(){

      const largura = window.innerWidth - 120;
      const altura = window.innerHeight - 120;

      const x = Math.random() * largura;
      const y = Math.random() * altura;

      nao.style.position = "fixed";
      nao.style.left = `${x}px`;
      nao.style.top = `${y}px`;
    }

    nao.addEventListener("mouseover", fugir);
    nao.addEventListener("touchstart", fugir);

    // botão SIM
    sim.addEventListener("click", () => {

      votos++;

      localStorage.setItem("votosSim", votos);

      contador.innerText = votos;

      mensagem.style.display = "block";
    });

  </script>

</body>
</html>
